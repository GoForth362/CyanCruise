<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CyanCruise 工作台</title>
  <link rel="stylesheet" href="assets/styles.css?v=20260619-cyancruise-v92">
</head>
<body>
  <main class="shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">CyanCruise</p>
        <h1>求职主循环</h1>
        <p class="lead">在苍穹 webapp 内串联目标岗位、画像、简历、诊断、今日行动、面试、助手和消息。</p>
      </div>
      <section class="identity-panel" aria-label="当前身份">
        <div>
          <span class="label">身份来源</span>
          <strong id="identityTitle">等待平台身份</strong>
          <small id="identityHint">生产模式只接受 Cosmic 登录上下文；开发验证请使用 identityMode=development。</small>
        </div>
        <div class="identity-row">
          <input id="userIdInput" autocomplete="off" placeholder="开发验证 userId">
          <button id="saveUserIdButton" type="button">加载</button>
        </div>
      </section>
    </header>

    <nav class="route-nav" id="routeNav" aria-label="CyanCruise 页面导航"></nav>

    <section id="messagePanel" class="message-panel hidden" aria-live="polite"></section>

    <section class="status-grid" aria-label="主循环状态">
      <article class="status-card">
        <span class="label">目标岗位</span>
        <strong id="targetRole">待确认</strong>
        <small id="profileStatus">等待用户身份</small>
      </article>
      <article class="status-card">
        <span class="label">准备度</span>
        <strong id="readinessScore">--</strong>
        <small id="readinessHint">补齐画像后开始计算</small>
      </article>
      <article class="status-card">
        <span class="label">简历状态</span>
        <strong id="resumeState">未知</strong>
        <small id="resumeHint">从简历页维护记录</small>
      </article>
      <article class="status-card">
        <span class="label">面试练习</span>
        <strong id="interviewState">未知</strong>
        <small id="interviewHint">完成简历后进入练习</small>
      </article>
    </section>

    <section id="pageHost" class="page-host" aria-live="polite">
      <section class="state-card warning">
        <h3>正在加载</h3>
        <p>正在识别平台身份并加载首页数据。</p>
      </section>
    </section>
  </main>
  <script src="assets/app.js?v=20260619-cyancruise-v92"></script>
</body>
</html>
